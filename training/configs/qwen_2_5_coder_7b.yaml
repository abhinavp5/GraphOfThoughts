# -----------------------------------------------------------------------
# Qwen 2.5-Coder-7B Instruct — Graph of Thoughts SFT config
#
# Code-specialized variant of Qwen 2.5. Structured token output
# (e.g. graph linearization "(u)-[w]->(v)") maps naturally to the
# code-token distributions this model was post-trained on.
# -----------------------------------------------------------------------

model:
  name: Qwen/Qwen2.5-Coder-7B-Instruct
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  seed: 42
  output_dir: checkpoints/qwen-2.5-coder-7b-got

data:
  train_dir: data/traces
  train_pattern: "train_*.json"
  val_pattern: "val_*.json"
  negative_sample_ratio: 0.2
  max_seq_length: 2048

special_tokens:
  - "<|CORRECTION|>"
